name: Run Typeform output on PR

on:
  pull_request:
    branches:
      - main

jobs:
  run-script:
    runs-on: ubuntu-latest

    env:
      TYPEFORM_FORM_ID: ${{ secrets.TYPEFORM_FORM_ID }}
      TYPEFORM_TOKEN: ${{ secrets.TYPEFORM_TOKEN }}
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      AZURE_OPENAI_ENDPOINT: https://xbi-openai-france.openai.azure.com
      AZURE_OPENAI_DEPLOYMENT: o4-mini
      AZURE_OPENAI_API_VERSION: 2024-12-01-preview

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install UV
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system .

      - name: Run TypeForm output
        run: python xbi_advisor/typeform_output.py
